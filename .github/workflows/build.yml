name: Build & Release Work Log

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build, Tag & Release
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Necessary for tag calculation

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'
        cache: 'gradle'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Run Unit Tests
      run: ./gradlew testDebugUnitTest

    # Compute and push new Semantic Version Tag based on Conventional Commits
    - name: Bump version and push tag
      id: bump_version
      uses: mathieudutour/github-tag-action@v6.2
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        default_bump: patch

    - name: Inject Version in build.gradle.kts
      run: |
        VERSION="${{ steps.bump_version.outputs.new_version }}"
        if [ -n "$VERSION" ]; then
          echo "Injecting version v$VERSION into build.gradle.kts..."
          sed -i 's/versionName = "[^"]*"/versionName = "'"$VERSION"'"/g' app/build.gradle.kts
        fi
        cat app/build.gradle.kts | grep "versionName ="

    - name: Build Debug & Release APKs
      run: ./gradlew assembleDebug assembleRelease
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    # Rename APK files to include version
    - name: Rename APKs
      if: ${{ steps.bump_version.outputs.new_version != '' }}
      run: |
        VERSION="${{ steps.bump_version.outputs.new_version }}"
        cp app/build/outputs/apk/debug/app-debug.apk "work_log_debug_v${VERSION}.apk"
        if [ -f app/build/outputs/apk/release/app-release.apk ]; then
          cp app/build/outputs/apk/release/app-release.apk "work_log_v${VERSION}.apk"
        elif [ -f app/build/outputs/apk/release/app-release-unsigned.apk ]; then
          cp app/build/outputs/apk/release/app-release-unsigned.apk "work_log_v${VERSION}.apk"
        fi

    # Create Release and Upload Assets
    - name: Create Release
      id: create_release
      if: ${{ steps.bump_version.outputs.new_version != '' }}
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.bump_version.outputs.new_version }}
        name: Release v${{ steps.bump_version.outputs.new_version }}
        body: |
          ## Quoi de neuf dans cette version (v${{ steps.bump_version.outputs.new_version }}) :
          
          ${{ steps.bump_version.outputs.changelog }}
        files: |
          work_log_debug_v${{ steps.bump_version.outputs.new_version }}.apk
          work_log_v${{ steps.bump_version.outputs.new_version }}.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # Update CHANGELOG.md in repository
    - name: Update CHANGELOG.md
      if: ${{ steps.bump_version.outputs.new_version != '' }}
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        VERSION="v${{ steps.bump_version.outputs.new_version }}"
        DATE=$(date +'%Y-%m-%d')
        CHANGELOG_CONTENT="${{ steps.bump_version.outputs.changelog }}"
        
        # Create CHANGELOG.md if not exists
        if [ ! -f CHANGELOG.md ]; then
          echo "# Changelog - Work Log" > CHANGELOG.md
          echo "Toutes les modifications de cette application seront consignées ici." >> CHANGELOG.md
        fi
        
        # Insert new version changelog at the top of the file
        echo -e "\n## [$VERSION] - $DATE\n$CHANGELOG_CONTENT" > temp_changelog.md
        cat CHANGELOG.md >> temp_changelog.md
        mv temp_changelog.md CHANGELOG.md
        
        git add CHANGELOG.md
        git commit -m "chore(release): update CHANGELOG.md for $VERSION [skip ci]"
        git push origin main
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
